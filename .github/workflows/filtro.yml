# .github/workflows/filtro.yml
name: Filtro Milhas Telegram

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  filtrar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Restaurar estado (checkpoint da última mensagem lida)
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: telegram-state-${{ github.run_number }}
          restore-keys: |
            telegram-state-

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install telethon requests

      - name: Executar filtro de milhas
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:  ${{ secrets.TELEGRAM_SESSION }}
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          MEU_CHAT_ID:       ${{ secrets.MEU_CHAT_ID }}
          EXIGIR_BONUS: "false"
        run: python filtro_telegram.py

      - name: Salvar estado (checkpoint)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: telegram-state-${{ github.run_number }}
